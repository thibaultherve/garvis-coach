services:
  influxdb:
    image: influxdb:1.11
    ports: ["${INFLUXDB_EXTERNAL_PORT:-8087}:8086"]
    volumes:
      - influxdb-data:/var/lib/influxdb
    environment:
      INFLUXDB_DB: ${INFLUXDB_DATABASE:-GarminStats}
      INFLUXDB_HTTP_AUTH_ENABLED: "true"
      INFLUXDB_ADMIN_USER: ${INFLUXDB_USERNAME}
      INFLUXDB_ADMIN_PASSWORD: ${INFLUXDB_PASSWORD}
    restart: unless-stopped

  garmin-fetch-data:
    image: thisisarpanghosh/garmin-fetch-data:latest
    env_file: .env
    volumes:
      - ./services/garmin-grafana/src/garmin_grafana/garmin_fetch.py:/app/garmin_grafana/garmin_fetch.py:ro
      - ./data/tokens:/home/appuser/.garminconnect
    depends_on: [influxdb]
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    ports: ["${GRAFANA_PORT:-3000}:3000"]
    volumes:
      - grafana-data:/var/lib/grafana
      - ./dashboards:/var/lib/grafana/dashboards/garvis:ro
      - ./provisioning/dashboards.yml:/etc/grafana/provisioning/dashboards/garvis.yml:ro
      - ./provisioning/datasources.yml:/etc/grafana/provisioning/datasources/influxdb.yml:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD:-admin}
    depends_on: [influxdb]
    restart: unless-stopped

  garmin-coach-mcp:
    build: ./services/garmin-coach-mcp
    ports: ["${MCP_COACH_PORT:-8765}:8765"]
    env_file: .env
    depends_on: [influxdb]
    restart: unless-stopped

  garmin-toolbox:
    build: ./services/garmin-toolbox
    ports: ["${MCP_TOOLBOX_PORT:-8770}:8769"]
    env_file: .env
    volumes:
      - ./data/activities:/app/activities
      - ./data/tokens:/root/.garminconnect
    depends_on: [influxdb]
    restart: unless-stopped

  grafana-mcp:
    image: mcp/grafana:latest
    ports: ["${MCP_GRAFANA_PORT:-8768}:8000"]
    environment:
      GRAFANA_URL: http://grafana:3000
      GRAFANA_API_KEY: ${GRAFANA_TOKEN}
    depends_on: [grafana]
    restart: unless-stopped

volumes:
  influxdb-data:
  grafana-data:
