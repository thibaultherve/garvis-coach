apiVersion: 1
datasources:
  - name: Garmin-InfluxDB
    type: influxdb
    access: proxy
    url: http://influxdb:8086
    database: GarminStats
    user: $INFLUXDB_USERNAME
    secureJsonData:
      password: $INFLUXDB_PASSWORD
    jsonData:
      httpMode: GET
    uid: garmin_influxdb
    isDefault: true
    editable: true
